version: 2
updates:
  - package-ecosystem: pip
    directory: "/server"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    labels:
      - dependencies
    groups:
      server-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions-deps:
        patterns:
          - "*"
